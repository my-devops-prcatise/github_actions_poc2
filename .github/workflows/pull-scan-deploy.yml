
name: Pull (DockerHub) -> Scan -> Deploy to EKS

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker Hub image tag to deploy (defaults to latest)'
        required: false
        default: 'latest'
      namespace:
        description: 'Kubernetes namespace (defaults to default)'
        required: false
        default: 'default'
      deployment_name:
        description: 'Kubernetes Deployment name'
        required: true
        default: 'talesofchina'
      container_name:
        description: 'Container name in the Deployment'
        required: true
        default: 'talesofchina'
      fail_on_vulns:
        description: 'Fail on HIGH/CRITICAL Trivy findings (true/false)'
        required: false
        default: 'true'

env:
  IMAGE_REPO: devenops641/talesofchina

jobs:
  scan-and-deploy:
    name: Scan image and deploy to EKS
    # Use self-hosted runner if you have one; otherwise switch to ubuntu-latest
    runs-on: self-hosted

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Resolve inputs and set env
        shell: bash
        run: |
          # Default image tag
          echo "IMAGE_TAG=${{ github.event.inputs.image_tag || 'latest' }}" >> "$GITHUB_ENV"
          echo "NAMESPACE=${{ github.event.inputs.namespace || 'default' }}" >> "$GITHUB_ENV"
          echo "DEPLOYMENT=${{ github.event.inputs.deployment_name || 'talesofchina' }}" >> "$GITHUB_ENV"
          echo "CONTAINER=${{ github.event.inputs.container_name || 'talesofchina' }}" >> "$GITHUB_ENV"
          echo "FAIL_ON_VULNS=${{ github.event.inputs.fail_on_vulns || 'true' }}" >> "$GITHUB_ENV"

      - name: Show configuration
        run: |
          echo "Image:        ${{ env.IMAGE_REPO }}:${{ env.IMAGE_TAG }}"
          echo "Namespace:    ${{ env.NAMESPACE }}"
          echo "Deployment:   ${{ env.DEPLOYMENT }}"
          echo "Container:    ${{ env.CONTAINER }}"
          echo "Fail on vulns: ${{ env.FAIL_ON_VULNS }}"

      # ----- SECURITY SCAN -----
      - name: Trivy scan (Docker Hub image)
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          image-ref: ${{ env.IMAGE_REPO }}:${{ env.IMAGE_TAG }}
          format: 'table'
          # If FAIL_ON_VULNS = true -> exit-code 1 (fail on HIGH/CRITICAL); else 0 (report-only)
          exit-code: ${{ env.FAIL_ON_VULNS == 'true' && '1' || '0' }}
          severity: 'CRITICAL,HIGH'

      # ----- AWS & KUBECTL SETUP -----
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # If you use ubuntu-latest, keep this step. For self-hosted, remove if kubectl is already installed.
      - name: Install kubectl (for GitHub-hosted runners)
        if: ${{ runner.runner_group != 'self-hosted' }}
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.29.0'  # pin to a known version compatible with your EKS cluster

      - name: Update kubeconfig (EKS)
        run: |
          aws eks update-kubeconfig \
            --region ${{ secrets.AWS_REGION }} \
            --name ${{ secrets.EKS_CLUSTER_NAME }}
          kubectl version --client

      - name: Verify cluster connectivity
        run: |
          kubectl get nodes -o wide
          kubectl get ns | grep -E "^${{ env.NAMESPACE }}\b" || echo "NOTE: Namespace ${{ env.NAMESPACE }} not found (will create on apply if manifests include it)"

      # ----- DEPLOY -----
      - name: Ensure Deployment exists (optional apply)
        # Uncomment if you keep your manifest in repo and want to apply before set image
        if: ${{ false }}
        run: |
          kubectl apply -n ${{ env.NAMESPACE }} -f k8s/deployment.yaml
          kubectl get deploy -n ${{ env.NAMESPACE }} ${{ env.DEPLOYMENT }}

      - name: Update Deployment image
        run: |
          set -e
          echo "Updating image to: ${{ env.IMAGE_REPO }}:${{ env.IMAGE_TAG }}"
          kubectl -n ${{ env.NAMESPACE }} set image deployment/${{ env.DEPLOYMENT }} \
            ${{ env.CONTAINER }}=${{ env.IMAGE_REPO }}:${{ env.IMAGE_TAG }} --record

      - name: Wait for rollout
        run: |
          kubectl -n ${{ env.NAMESPACE }} rollout status deployment/${{ env.DEPLOYMENT }} --timeout=180s

      - name: Show pods after rollout
        run: |
          kubectl -n ${{ env.NAMESPACE }} get pods -l app=${{ env.DEPLOYMENT }} -o wide || \
          kubectl -n ${{ env.NAMESPACE }} get pods -o wide
