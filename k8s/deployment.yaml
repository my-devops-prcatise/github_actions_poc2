apiVersion: apps/v1
kind: Deployment
metadata:
  name: talesofchina
  labels:
    app: talesofchina
spec:
  replicas: 2
  selector:
    matchLabels:
      app: talesofchina
  template:
    metadata:
      labels:
        app: talesofchina
    spec:
      containers:
        - name: talesofchina
          image: devenops641/talesofchina:latest
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
